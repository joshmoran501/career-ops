# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# Configured for: Joshua Moran
# Target roles: Entry-level Software Engineer, Full Stack Developer, Data Analyst
# Locations: Omaha, NE or Atlanta, GA (open to remote and hybrid)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Software Engineering --
    - "Software Engineer"
    - "Software Developer"
    - "Full Stack"
    - "Fullstack"
    - "Full-Stack"
    - "Backend Engineer"
    - "Backend Developer"
    - "Frontend Engineer"
    - "Frontend Developer"
    - "Web Developer"
    - "Application Developer"
    - "Junior Developer"
    - "Junior Engineer"
    - "Associate Engineer"
    - "Associate Developer"
    # -- Data --
    - "Data Analyst"
    - "Data Engineer"
    - "Business Analyst"
    - "Analytics Engineer"
    - "Database Developer"
    - "SQL Developer"
    # -- Android / Mobile --
    - "Android Developer"
    - "Android Engineer"
    - "Mobile Developer"
    # -- General tech --
    - "QA Engineer"
    - "Test Engineer"
    - "DevOps Engineer"
    - "Support Engineer"
    - "IT Developer"
    - "Systems Developer"
  negative:
    - "Staff"
    - "Principal"
    - "Director"
    - "VP "
    - "Architect"
    - "Distinguished"
    - ".NET"
    - "iOS"
    - "Swift"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Ruby on Rails"
    - "Rust"
    - "Go Engineer"
    - "Scala"
    - "Elixir"
  seniority_boost:
    - "Junior"
    - "Associate"
    - "Entry"

# -- Search queries --
# Each query triggers a WebSearch. The scanner extracts title, URL, and company.

search_queries:

  # ── Omaha / Nebraska ──

  - name: Indeed — Software Engineer Omaha
    query: 'site:indeed.com "Software Engineer" OR "Software Developer" Omaha NE entry OR junior'
    enabled: true

  - name: Indeed — Full Stack Omaha
    query: 'site:indeed.com "Full Stack Developer" OR "Full Stack Engineer" Omaha NE'
    enabled: true

  - name: Indeed — Data Analyst Omaha
    query: 'site:indeed.com "Data Analyst" OR "Business Analyst" Omaha NE entry OR junior'
    enabled: true

  - name: LinkedIn — Software Engineer Omaha
    query: 'site:linkedin.com/jobs "Software Engineer" OR "Software Developer" Omaha Nebraska entry OR junior'
    enabled: true

  - name: LinkedIn — Data Analyst Omaha
    query: 'site:linkedin.com/jobs "Data Analyst" OR "Analytics Engineer" Omaha Nebraska entry OR junior'
    enabled: true

  - name: Nebraska Tech — All Roles
    query: '"Software Engineer" OR "Developer" OR "Data Analyst" "Omaha" OR "Lincoln" OR "Nebraska" -senior -staff -lead'
    enabled: true

  - name: Builtin — Omaha Tech
    query: 'site:builtin.com "Software Engineer" OR "Developer" OR "Data Analyst" Omaha OR Nebraska'
    enabled: true

  # ── Atlanta / Georgia ──

  - name: Indeed — Software Engineer Atlanta
    query: 'site:indeed.com "Software Engineer" OR "Software Developer" Atlanta GA entry OR junior'
    enabled: true

  - name: Indeed — Full Stack Atlanta
    query: 'site:indeed.com "Full Stack Developer" OR "Full Stack Engineer" Atlanta GA'
    enabled: true

  - name: Indeed — Data Analyst Atlanta
    query: 'site:indeed.com "Data Analyst" OR "Business Analyst" Atlanta GA entry OR junior'
    enabled: true

  - name: LinkedIn — Software Engineer Atlanta
    query: 'site:linkedin.com/jobs "Software Engineer" OR "Software Developer" Atlanta Georgia entry OR junior'
    enabled: true

  - name: LinkedIn — Data Analyst Atlanta
    query: 'site:linkedin.com/jobs "Data Analyst" OR "Analytics Engineer" Atlanta Georgia entry OR junior'
    enabled: true

  - name: Atlanta Tech — All Roles
    query: '"Software Engineer" OR "Developer" OR "Data Analyst" "Atlanta" OR "Georgia" -senior -staff -lead'
    enabled: true

  - name: Builtin — Atlanta Tech
    query: 'site:builtin.com "Software Engineer" OR "Developer" OR "Data Analyst" Atlanta OR Georgia'
    enabled: true

  # ── Remote / National ──

  - name: LinkedIn — Full Stack Remote
    query: 'site:linkedin.com/jobs "Full Stack Developer" OR "Full Stack Engineer" remote entry OR junior'
    enabled: true

  - name: LinkedIn — Remote Junior Engineer
    query: 'site:linkedin.com/jobs "Junior Software Engineer" OR "Associate Software Engineer" remote'
    enabled: true

  # ── ATS portals (Ashby) ──

  - name: Ashby — Software Engineer
    query: 'site:jobs.ashbyhq.com "Software Engineer" OR "Full Stack" OR "Web Developer" remote OR "United States"'
    enabled: true

  - name: Ashby — Data Analyst
    query: 'site:jobs.ashbyhq.com "Data Analyst" OR "Analytics Engineer" OR "Business Analyst" remote OR "United States"'
    enabled: true

  - name: Ashby — Junior & Entry Level
    query: 'site:jobs.ashbyhq.com "Junior" OR "Associate" OR "Entry Level" "Engineer" OR "Developer" OR "Analyst"'
    enabled: true

  # ── ATS portals (Greenhouse) ──

  - name: Greenhouse — Software Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" OR "Full Stack" remote OR "United States"'
    enabled: true

  - name: Greenhouse — Data Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Data Analyst" OR "Analytics Engineer" remote OR "United States"'
    enabled: true

  - name: Greenhouse — Junior Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Junior Engineer" OR "Associate Developer" OR "Entry Level"'
    enabled: true

  # ── ATS portals (Lever) ──

  - name: Lever — Software Engineer
    query: 'site:jobs.lever.co "Software Engineer" OR "Full Stack Developer" OR "Web Developer" remote'
    enabled: true

  - name: Lever — Data Analyst
    query: 'site:jobs.lever.co "Data Analyst" OR "Business Analyst" OR "Analytics" remote'
    enabled: true

  # ── Other portals ──

  - name: Wellfound — Junior Software Engineer
    query: 'site:wellfound.com "Software Engineer" OR "Full Stack" junior OR entry remote'
    enabled: true

  - name: Workable — Developer Roles
    query: 'site:apply.workable.com "Software Engineer" OR "Full Stack" OR "Web Developer" remote'
    enabled: true

